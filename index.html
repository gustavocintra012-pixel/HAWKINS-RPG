<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Hawkins RPG</title>

<style>
body {
    margin: 0;
    background: #e6e6e6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: monospace;
}

.terminal {
    width: 900px;
    height: 600px;
    background: #0d0d0d;
    color: #00ff66;
    display: flex;
    flex-direction: column;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.header {
    background: #1a1a1a;
    padding: 8px;
    color: #aaa;
    font-size: 12px;
}

.screen {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    white-space: pre-wrap;
}

.input {
    border-top: 1px solid #222;
}

input {
    width: 100%;
    padding: 12px;
    background: black;
    border: none;
    outline: none;
    color: #00ff66;
    font-family: monospace;
}
</style>
</head>

<body>

<div class="terminal">
    <div class="header">HAWKINS TERMINAL</div>
    <div id="screen" class="screen"></div>
    <div class="input">
        <input id="cmd" placeholder="digite um comando..." autofocus />
    </div>
</div>

<script src="game.js"></script>

</body>
</html>
